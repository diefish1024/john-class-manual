services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./site:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - oauth2-proxy
    networks:
      - web
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Starts only when running: docker compose --profile auth up
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    profiles:
      - auth
    restart: unless-stopped
    command:
      - --http-address=0.0.0.0:4180
      - --provider=oidc
      - --oidc-issuer-url=${OIDC_ISSUER_URL}
      - --client-id=${OAUTH2_CLIENT_ID}
      - --client-secret=${OAUTH2_CLIENT_SECRET}
      - --cookie-secret=${OAUTH2_COOKIE_SECRET}
      - --cookie-secure=false
      - --cookie-expire=24h
      - --email-domain=*
      - --authenticated-emails-file=/etc/oauth2-proxy/whitelist.txt
      - --upstream=http://nginx:80
      - --redirect-url=http://localhost/oauth2/callback
      - --skip-provider-button=true
      - --pass-access-token=true
      - --set-xauthrequest=true
    environment:
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_COOKIE_SECRET}
    volumes:
      - ./whitelist.txt:/etc/oauth2-proxy/whitelist.txt:ro
    expose:
      - "4180"
    networks:
      - web
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4180/ping"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  web:
    driver: bridge
