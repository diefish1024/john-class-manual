site_name: "John Class Manual"
site_description: "Survival guide for John Class at Shanghai Jiao Tong University"
site_author: "John Class"
site_url: "https://diefish1024.github.io/john-class-manual/"
repo_url: "https://github.com/diefish1024/john-class-manual"
repo_name: "john-class-manual"
edit_uri: "edit/main/docs/"

docs_dir: docs
site_dir: site

theme:
  name: material
  language: zh
  font:
    text: "Noto Sans SC"
    code: "JetBrains Mono"
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - header.autohide
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang:
        - zh
        - en
      separator: '[\s\u200b\-\_]'
      jieba_dict: null
  - minify:
      minify_html: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/your-org/john-class-manual
      name: GitHub
  generator: false

nav:
  - Home: index.md

  - 开篇寄语:
    - 寄语与版权: preface/index.md

  - 基本知识:
    - 概览: basics/index.md
    - 班级介绍: basics/class-intro.md
    - 提问的智慧: basics/how-to-ask.md

  - 日常内容:
    - 概览: daily/index.md
    - 校园生活: daily/campus-life.md
    - 行政事务: daily/administration.md
    - 网站与资源: daily/websites.md
    - AI 与生产力工具: daily/ai-tools.md
    - 自习空间: daily/study-spaces.md
    - 实用工具: daily/tools.md

  - 课内课程:
