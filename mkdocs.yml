      - 数学分析（荣誉）: courses/math-foundations/math-analysis.md
      - 物理学引论（荣誉）: courses/math-foundations/physics.md
      - 物理学实验: courses/math-foundations/physics-lab.md
      - 线性代数（荣誉）: courses/math-foundations/linear-algebra.md
      - 概率论: courses/math-foundations/probability.md
    - CS 必修:
      - courses/cs-core/index.md
      - 理论计算机科学导论: courses/cs-core/tcs-intro.md
      - 程序设计与数据结构: courses/cs-core/programming-ds.md
      - 算法: courses/cs-core/algorithms.md
      - 数理逻辑: courses/cs-core/logic.md
      - 组合数学: courses/cs-core/combinatorics.md
      - 程序语言设计与实现: courses/cs-core/pl-design.md
      - 计算机系统: courses/cs-core/computer-systems.md
      - 操作系统: courses/cs-core/os.md
      - 近世代数: courses/cs-core/abstract-algebra.md
      - 计算复杂性: courses/cs-core/complexity.md
      - 数据库系统: courses/cs-core/database.md
    - 选修:
